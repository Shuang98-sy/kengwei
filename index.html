<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>坑位信息查询系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 28px;
            margin-bottom: 8px;
        }
        
        .header p {
            opacity: 0.9;
            font-size: 14px;
        }
        
        .search-section {
            padding: 30px;
            background: #f8f9fa;
            border-bottom: 1px solid #e9ecef;
        }
        
        .search-box {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            margin-bottom: 15px;
        }
        
        .search-type {
            padding: 12px 16px;
            border: 2px solid #667eea;
            border-radius: 8px;
            font-size: 14px;
            background: white;
            color: #333;
            cursor: pointer;
            outline: none;
        }
        
        .search-type:focus {
            border-color: #764ba2;
        }
        
        .search-input {
            flex: 1;
            min-width: 200px;
            max-width: 400px;
            padding: 12px 16px;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.3s;
        }
        
        .search-input:focus {
            border-color: #667eea;
        }
        
        .search-btn {
            padding: 12px 32px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .search-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
        
        .search-btn:active {
            transform: translateY(0);
        }
        
        .quick-filters {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 15px;
        }
        
        .filter-btn {
            padding: 8px 16px;
            background: white;
            border: 2px solid #e0e0e0;
            border-radius: 20px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            color: #555;
        }
        
        .filter-btn:hover {
            border-color: #667eea;
            color: #667eea;
        }
        
        .filter-btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-color: #667eea;
            color: white;
        }
        
        .stats {
            text-align: center;
            padding: 15px;
            background: #fff;
            color: #666;
            font-size: 14px;
        }
        
        .stats span {
            color: #667eea;
            font-weight: bold;
        }
        
        .result-section {
            padding: 20px;
        }
        
        .result-info {
            margin-bottom: 15px;
            padding: 12px 16px;
            background: #e8f4fd;
            border-radius: 8px;
            color: #1976d2;
            font-size: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .sort-controls {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .sort-controls label {
            font-size: 13px;
            color: #666;
        }
        
        .sort-select {
            padding: 6px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 13px;
            cursor: pointer;
        }
        
        .no-result {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }
        
        .no-result svg {
            width: 80px;
            height: 80px;
            margin-bottom: 20px;
            opacity: 0.5;
        }
        
        .loading {
            text-align: center;
            padding: 60px 20px;
            color: #667eea;
        }
        
        .loading p {
            margin-top: 15px;
        }
        
        .error {
            text-align: center;
            padding: 60px 20px;
            color: #e74c3c;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }
        
        thead {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        th {
            padding: 14px 12px;
            text-align: left;
            font-weight: 500;
            white-space: nowrap;
        }
        
        td {
            padding: 12px;
            border-bottom: 1px solid #e9ecef;
        }
        
        tbody tr:hover {
            background: #f8f9fa;
        }
        
        .table-container {
            overflow-x: auto;
        }
        
        .highlight {
            background: #fff3cd;
            padding: 2px 4px;
            border-radius: 3px;
        }
        
        .slot-count {
            font-weight: bold;
            padding: 4px 10px;
            border-radius: 12px;
            display: inline-block;
            min-width: 30px;
            text-align: center;
        }
        
        .slot-high {
            background: #d4edda;
            color: #155724;
        }
        
        .slot-medium {
            background: #fff3cd;
            color: #856404;
        }
        
        .slot-low {
            background: #f8d7da;
            color: #721c24;
        }
        
        .footer {
            text-align: center;
            padding: 20px;
            background: #f8f9fa;
            color: #999;
            font-size: 12px;
        }
        
        @media (max-width: 768px) {
            .search-box {
                flex-direction: column;
            }
            
            .search-input {
                max-width: 100%;
            }
            
            th, td {
                padding: 10px 8px;
                font-size: 13px;
            }
            
            .result-info {
                flex-direction: column;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔍 坑位信息查询系统</h1>
            <p>支持微信昵称模糊查询，微信ID/手机号精确查询</p>
        </div>
        
        <div class="search-section">
            <div class="search-box">
                <select class="search-type" id="searchType">
                    <option value="nickname">微信昵称（模糊）</option>
                    <option value="wxid">微信号（精确）</option>
                    <option value="phone">手机号（精确）</option>
                </select>
                <input type="text" class="search-input" id="searchInput" placeholder="请输入查询内容...">
                <button class="search-btn" onclick="search()">查询</button>
            </div>
            
            <div class="quick-filters">
                <button class="filter-btn" id="filterAvailable" onclick="toggleFilter('available')">
                    可加群（剩余>0）
                </button>
                <button class="filter-btn" id="filterPhone" onclick="toggleFilter('phone')">
                    有手机号
                </button>
                <button class="filter-btn" id="filterVerified" onclick="toggleFilter('verified')">
                    已实名
                </button>
                <button class="filter-btn" id="filterClear" onclick="clearFilters()" style="background: #f8f9fa; color: #666;">
                    清除筛选
                </button>
            </div>
        </div>
        
        <div class="stats">
            共 <span id="totalCount">加载中...</span> 条坑位信息 | 数据更新时间：<span id="updateTime">--</span>
        </div>
        
        <div class="result-section" id="resultSection">
            <div class="loading" id="loading">
                <svg width="50" height="50" viewBox="0 0 50 50">
                    <circle cx="25" cy="25" r="20" fill="none" stroke="#667eea" stroke-width="4" stroke-dasharray="80, 200" stroke-linecap="round">
                        <animateTransform attributeName="transform" type="rotate" from="0 25 25" to="360 25 25" dur="1s" repeatCount="indefinite"/>
                    </circle>
                </svg>
                <p>正在加载数据...</p>
            </div>
        </div>
        
        <div class="footer">
            数据更新时间：请查看页面上方显示的时间
        </div>
    </div>

    <script>
        let DATA = [];
        let activeFilters = {
            available: false,
            phone: false,
            verified: false
        };
        let currentSort = 'none';
        let lastSearchResults = [];
        let lastSearchType = '';
        let lastSearchKeyword = '';
        
        async function loadData() {
            try {
                const response = await fetch('./data.json');
                if (!response.ok) throw new Error('数据加载失败');
                const jsonData = await response.json();
                
                DATA = jsonData.data || jsonData;
                const updateTime = jsonData.update_time || '未知';
                
                document.getElementById('totalCount').textContent = DATA.length;
                document.getElementById('updateTime').textContent = updateTime;
                document.getElementById('resultSection').innerHTML = `
                    <div class="no-result">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <circle cx="11" cy="11" r="8"/>
                            <path d="M21 21l-4.35-4.35"/>
                        </svg>
                        <p>输入关键词开始查询，或点击上方筛选按钮</p>
                    </div>
                `;
            } catch (error) {
                document.getElementById('resultSection').innerHTML = `
                    <div class="error">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="60" height="60">
                            <circle cx="12" cy="12" r="10"/>
                            <line x1="15" y1="9" x2="9" y2="15"/>
                            <line x1="9" y1="9" x2="15" y2="15"/>
                        </svg>
                        <p>数据加载失败，请刷新页面重试</p>
                    </div>
                `;
                document.getElementById('totalCount').textContent = '加载失败';
            }
        }
        
        loadData();
        
        document.getElementById('searchInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                search();
            }
        });
        
        function toggleFilter(filterType) {
            activeFilters[filterType] = !activeFilters[filterType];
            
            const btn = document.getElementById('filter' + filterType.charAt(0).toUpperCase() + filterType.slice(1));
            if (activeFilters[filterType]) {
                btn.classList.add('active');
            } else {
                btn.classList.remove('active');
            }
            
            if (lastSearchResults.length === 0) {
                lastSearchResults = [...DATA];
                lastSearchType = 'all';
                lastSearchKeyword = '全部';
            }
            
            applyFiltersAndDisplay();
        }
        
        function clearFilters() {
            activeFilters = {
                available: false,
                phone: false,
                verified: false
            };
            currentSort = 'none';
            
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            
            lastSearchResults = [];
            
            document.getElementById('resultSection').innerHTML = `
                <div class="no-result">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <circle cx="11" cy="11" r="8"/>
                        <path d="M21 21l-4.35-4.35"/>
                    </svg>
                    <p>输入关键词开始查询，或点击上方筛选按钮</p>
                </div>
            `;
        }
        
        function search() {
            const type = document.getElementById('searchType').value;
            const keyword = document.getElementById('searchInput').value.trim();
            
            if (!keyword) {
                alert('请输入查询内容');
                return;
            }
            
            if (DATA.length === 0) {
                alert('数据正在加载，请稍后再试');
                return;
            }
            
            let results = [];
            
            if (type === 'nickname') {
                results = DATA.filter(item => {
                    const nickname = item['微信昵称'] || '';
                    return nickname.includes(keyword);
                });
            } else if (type === 'wxid') {
                results = DATA.filter(item => {
                    const wxid = item['微信号'] || '';
                    return wxid === keyword;
                });
            } else if (type === 'phone') {
                results = DATA.filter(item => {
                    const phone = String(item['手机号'] || '');
                    return phone === keyword;
                });
            }
            
            lastSearchResults = results;
            lastSearchType = type;
            lastSearchKeyword = keyword;
            
            applyFiltersAndDisplay();
        }
        
        function applyFiltersAndDisplay() {
            let filtered = [...lastSearchResults];
            
            if (activeFilters.available) {
                filtered = filtered.filter(item => {
                    const slots = parseInt(item['剩余可加群聊数']) || 0;
                    return slots > 0;
                });
            }
            
            if (activeFilters.phone) {
                filtered = filtered.filter(item => {
                    const phone = item['手机号'];
                    return phone && phone !== '--' && phone !== '';
                });
            }
            
            if (activeFilters.verified) {
                filtered = filtered.filter(item => {
                    const verified = item['实名认证'] || '';
                    return verified.includes('已') || verified.includes('是') || verified === '已实名';
                });
            }
            
            if (currentSort === 'desc') {
                filtered.sort((a, b) => {
                    const slotsA = parseInt(a['剩余可加群聊数']) || 0;
                    const slotsB = parseInt(b['剩余可加群聊数']) || 0;
                    return slotsB - slotsA;
                });
            } else if (currentSort === 'asc') {
                filtered.sort((a, b) => {
                    const slotsA = parseInt(a['剩余可加群聊数']) || 0;
                    const slotsB = parseInt(b['剩余可加群聊数']) || 0;
                    return slotsA - slotsB;
                });
            }
            
            displayResults(filtered, lastSearchType, lastSearchKeyword);
        }
        
        function sortResults() {
            currentSort = document.getElementById('sortSelect').value;
            if (lastSearchResults.length > 0) {
                applyFiltersAndDisplay();
            }
        }
        
        function displayResults(results, type, keyword) {
            const section = document.getElementById('resultSection');
            
            if (results.length === 0) {
                section.innerHTML = `
                    <div class="no-result">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <circle cx="12" cy="12" r="10"/>
                            <path d="M8 15s1.5 2 4 2 4-2 4-2"/>
                            <line x1="9" y1="9" x2="9.01" y2="9"/>
                            <line x1="15" y1="9" x2="15.01" y2="9"/>
                        </svg>
                        <p>未找到匹配的记录</p>
                    </div>
                `;
                return;
            }
            
            const typeText = type === 'nickname' ? '微信昵称' : (type === 'wxid' ? '微信号' : (type === 'phone' ? '手机号' : '全部数据'));
            
            let html = `
                <div class="result-info">
                    <div>找到 <strong>${results.length}</strong> 条匹配记录（${typeText}：${keyword}）</div>
                    <div class="sort-controls">
                        <label>排序：</label>
                        <select class="sort-select" id="sortSelect" onchange="sortResults()">
                            <option value="none">默认</option>
                            <option value="desc">剩余可加群聊数 ↓</option>
                            <option value="asc">剩余可加群聊数 ↑</option>
                        </select>
                    </div>
                </div>
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>设备编码2</th>
                                <th>手机号</th>
                                <th>微信号</th>
                                <th>微信昵称</th>
                                <th>实名认证</th>
                                <th>设备状态</th>
                                <th>投产状态</th>
                                <th>剩余可加群聊数</th>
                            </tr>
                        </thead>
                        <tbody>
            `;
            
            results.forEach(item => {
                const slots = parseInt(item['剩余可加群聊数']) || 0;
                let slotClass = 'slot-low';
                if (slots > 5) {
                    slotClass = 'slot-high';
                } else if (slots > 0) {
                    slotClass = 'slot-medium';
                }
                
                html += `
                    <tr>
                        <td>${item['设备编码2'] || '--'}</td>
                        <td>${item['手机号'] || '--'}</td>
                        <td>${item['微信号'] || '--'}</td>
                        <td>${highlightKeyword(item['微信昵称'] || '--', keyword, type)}</td>
                        <td>${item['实名认证'] || '--'}</td>
                        <td>${item['设备状态'] || '--'}</td>
                        <td>${item['投产状态'] || '--'}</td>
                        <td><span class="slot-count ${slotClass}">${slots}</span></td>
                    </tr>
                `;
            });
            
            html += `
                        </tbody>
                    </table>
                </div>
            `;
            
            section.innerHTML = html;
            
            if (currentSort !== 'none') {
                document.getElementById('sortSelect').value = currentSort;
            }
        }
        
        function highlightKeyword(text, keyword, type) {
            if (type === 'nickname') {
                const regex = new RegExp(`(${escapeRegExp(keyword)})`, 'gi');
                return text.replace(regex, '<span class="highlight">$1</span>');
            }
            return text;
        }
        
        function escapeRegExp(string) {
            return string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        }
    </script>
</body>
</html>
